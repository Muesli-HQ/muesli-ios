name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Select iPhone simulator
        id: simulator
        run: |
          SIMULATOR_UDID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ && /Shutdown|Booted/ { print $2; exit }')"
          if [ -z "$SIMULATOR_UDID" ]; then
            echo "No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "udid=$SIMULATOR_UDID" >> "$GITHUB_OUTPUT"
      - name: Build for simulator
        run: |
          xcodebuild \
            -project MuesliiOS.xcodeproj \
            -scheme Muesli \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Run unit and UI tests
        run: |
          xcodebuild \
            test \
            -project MuesliiOS.xcodeproj \
            -scheme Muesli \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}' \
            CODE_SIGNING_ALLOWED=NO
