name: MuesliiOS
options:
  bundleIdPrefix: com.phequals7
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 58W55QJ567
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.14.5"

targets:
  Muesli:
    type: application
    platform: iOS
    sources:
      - path: Muesli
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phequals7.muesli.ios
        PRODUCT_NAME: Muesli
        INFOPLIST_FILE: Muesli/Info.plist
        CODE_SIGN_ENTITLEMENTS: Muesli/Muesli.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: MuesliKeyboard
      - package: FluidAudio

  MuesliKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: MuesliKeyboard
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phequals7.muesli.ios.keyboard
        PRODUCT_NAME: MuesliKeyboard
        INFOPLIST_FILE: MuesliKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: MuesliKeyboard/MuesliKeyboard.entitlements
        SKIP_INSTALL: true

  MuesliTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/MuesliTests
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phequals7.muesli.ios.tests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Muesli

schemes:
  Muesli:
    build:
      targets:
        Muesli: all
        MuesliKeyboard: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MuesliTests
    archive:
      config: Release

  MuesliKeyboard:
    build:
      targets:
        MuesliKeyboard: all
    run:
      config: Debug
      askForAppToLaunch: true
    archive:
      config: Release
